                      lambda value: int(value * opacity / 255)
                  )
                  layer.putalpha(alpha)

              return layer

          def split_words(text):
              return text.strip().split()

          def wrap_words(draw, words, font, max_width):
              lines = []
              current = []

              for word in words:
                  candidate = current + [word]
                  candidate_text = " ".join(candidate)

                  box = draw.textbbox(
                      (0, 0),
                      candidate_text,
                      font=font,
                  )

                  if box[2] - box[0] <= max_width:
                      current = candidate
                  else:
                      if current:
                          lines.append(current)
                      current = [word]

              if current:
                  lines.append(current)

              return lines

          def draw_text_with_highlight(
              draw,
              text,
              highlight,
              scene_progress,
          ):
              words = split_words(text)

              # Uzun cümlede daha küçük font.
              font = body_font if len(text) <= 78 else body_font_small
              max_width = WIDTH - 100
              lines = wrap_words(
                  draw,
                  words,
                  font,
                  max_width,
              )

              line_height = font.size + 18
              total_height = len(lines) * line_height

              start_y = int(HEIGHT * 0.70 - total_height / 2)

              # Yarı saydam metin kartı
              card_top = start_y - 34
              card_bottom = start_y + total_height + 27

              draw.rounded_rectangle(
                  (
                      34,
                      card_top,
                      WIDTH - 34,
                      card_bottom,
                  ),
                  radius=34,
                  fill=(2, 12, 39, 160),
                  outline=(255, 255, 255, 30),
                  width=2,
              )

              lowered_highlight = highlight.casefold().strip()

              for line_index, line_words in enumerate(lines):
                  widths = []

                  for word in line_words:
                      box = draw.textbbox(
                          (0, 0),
                          word,
                          font=font,
                      )
                      widths.append(box[2] - box[0])

                  space_box = draw.textbbox(
                      (0, 0),
                      " ",
                      font=font,
                  )
                  space_width = space_box[2] - space_box[0]

                  line_width = (
                      sum(widths)
                      + space_width * max(0, len(line_words) - 1)
                  )

                  x = int((WIDTH - line_width) / 2)
                  y = start_y + line_index * line_height

                  for word_index, word in enumerate(line_words):
                      clean_word = word.strip(
                          ".,!?;:()[]{}\"'“”"
                      )

                      is_highlight = (
                          clean_word.casefold()
                          == lowered_highlight
                      )

                      color = RED if is_highlight else WHITE

                      # Hafif gölge
                      draw.text(
                          (x + 3, y + 4),
                          word,
                          font=font,
                          fill=(0, 0, 0, 130),
                      )

                      draw.text(
                          (x, y),
                          word,
                          font=font,
                          fill=color,
                      )

                      if is_highlight:
                          underline_y = y + font.size + 6

                          pulse = (
                              0.65
                              + 0.35
                              * (
                                  0.5
                                  + 0.5
                                  * math.sin(
                                      scene_progress
                                      * math.pi
                                      * 4
                                  )
                              )
                          )

                          draw.rounded_rectangle(
                              (
                                  x,
                                  underline_y,
                                  x + widths[word_index],
                                  underline_y + 7,
                              ),
                              radius=3,
                              fill=(
                                  RED[0],
                                  RED[1],
                                  RED[2],
                                  int(255 * pulse),
                              ),
                          )

                      x += widths[word_index] + space_width

          # Global video pipeline
          ffmpeg = subprocess.Popen(
              [
                  "ffmpeg",
                  "-y",
                  "-f", "rawvideo",
                  "-pix_fmt", "rgb24",
                  "-s", f"{WIDTH}x{HEIGHT}",
                  "-r", str(FPS),
                  "-i", "-",
                  "-an",
                  "-c:v", "libx264",
                  "-preset", "fast",
                  "-crf", "20",
                  "-pix_fmt", "yuv420p",
                  "visuals_720x1280.mp4",
              ],
              stdin=subprocess.PIPE,
          )

          total_frames = int(round(audio_duration * FPS))
          frame_cursor = 0

          scene_frame_counts = [
              max(1, int(round(duration * FPS)))
              for duration in scene_durations
          ]

          # Tam frame sayısını son sahneye eşitle.
          scene_frame_counts[-1] += (
              total_frames - sum(scene_frame_counts)
          )

          for scene_index, scene in enumerate(scenes):
              scene_frames = scene_frame_counts[scene_index]

              for local_frame in range(scene_frames):
                  global_progress = (
                      frame_cursor / max(1, total_frames - 1)
                  )

                  scene_progress = (
                      local_frame / max(1, scene_frames - 1)
                  )

                  base = create_gradient()
                  draw = ImageDraw.Draw(base, "RGBA")

                  draw_particles(
                      draw,
                      frame_cursor,
                      scene_index + 1,
                  )

                  draw_wave_lines(
                      draw,
                      frame_cursor,
                  )

                  draw_brand(
                      draw,
                      scene_index + 1,
                  )

                  visual = draw_visual(
                      scene.get(
                          "visual_key",
                          "mindy_thinking"
                      ),
                      scene_progress,
                      scene_progress,
                      scene_index + 1,
                  )

                  base.alpha_composite(visual)

                  draw = ImageDraw.Draw(base, "RGBA")

                  draw_text_with_highlight(
                      draw,
                      str(scene.get("text", "")),
                      str(scene.get("highlight", "")),
                      scene_progress,
                  )

                  draw_progress(
                      draw,
                      global_progress,
                  )

                  draw_vignette(base)

                  frame = base.convert("RGB")

                  ffmpeg.stdin.write(frame.tobytes())
                  frame_cursor += 1

          ffmpeg.stdin.close()
          return_code = ffmpeg.wait()

          if return_code != 0:
              raise RuntimeError(
                  f"FFmpeg render hatası. Kod: {return_code}"
              )

          print("Render tamamlandı.")
          print("Ses süresi:", audio_duration)
          print("Toplam frame:", frame_cursor)
          PY

      - name: Görüntüyü 1080x1920 yükselt
        run: |
          ffmpeg -y \
            -i visuals_720x1280.mp4 \
            -vf "scale=1080:1920:flags=lanczos" \
            -c:v libx264 \
            -preset fast \
            -crf 19 \
            -pix_fmt yuv420p \
            visuals.mp4

      - name: Ses, müzik ve görüntüyü birleştir
        run: |
          ffmpeg -y \
            -i visuals.mp4 \
            -i voice.mp3 \
            -i music.m4a \
            -filter_complex "\
              [1:a]volume=1.0[voice];\
              [2:a]volume=0.35[music];\
              [voice][music]amix=inputs=2:duration=first:dropout_transition=2[audio]" \
            -map 0:v:0 \
            -map "[audio]" \
            -c:v copy \
            -c:a aac \
            -b:a 192k \
            -shortest \
            final-video.mp4

      - name: Video bilgilerini göster
        run: |
          ffprobe -v error \
            -show_entries format=duration,size \
            -show_entries stream=codec_name,width,height,r_frame_rate \
            -of default=noprint_wrappers=1 \
            final-video.mp4

      - name: Son videoyu artifact olarak kaydet
        uses: actions/upload-artifact@v4
        with:
          name: final-youtube-video
          path: final-video.mp4
          retention-days: 7
          if-no-files-found: error
