          def draw_visual(
              visual_key,
              animation_progress,
              scene_progress,
              scene_number,
          ):
              layer = Image.new(
                  "RGBA",
                  (WIDTH, HEIGHT),
                  (0, 0, 0, 0)
              )

              base_x = WIDTH // 2
              base_y = int(HEIGHT * 0.44)
              base_scale = 1.0
              rotation = 0
              opacity = 255

              if animation_progress < 0.20:
                  intro = animation_progress / 0.20
              else:
                  intro = 1.0

              # Sahne animasyonu
              animation = scenes[scene_number - 1].get(
                  "animation",
                  "fade_in"
              )

              if animation == "fade_in":
                  opacity = int(255 * ease_in_out(intro))

              elif animation == "pop":
                  base_scale *= max(
                      0.01,
                      ease_out_back(intro)
                  )

              elif animation == "slide_left":
                  base_x += int((1 - ease_in_out(intro)) * WIDTH * 0.42)

              elif animation == "slide_right":
                  base_x -= int((1 - ease_in_out(intro)) * WIDTH * 0.42)

              elif animation == "slow_zoom":
                  base_scale *= 0.94 + scene_progress * 0.12

              elif animation == "pulse":
                  base_scale *= 1.0 + math.sin(
                      scene_progress * math.pi * 6
                  ) * 0.055

              elif animation == "shake":
                  base_x += int(
                      math.sin(scene_progress * math.pi * 22) * 9
                  )

              elif animation == "float":
                  base_y += int(
                      math.sin(scene_progress * math.pi * 4) * 18
                  )

              elif animation == "bounce":
                  base_y -= int(
                      abs(
                          math.sin(scene_progress * math.pi * 5)
                      ) * 25
                  )

              draw_glow_circle(
                  layer,
                  base_x,
                  base_y,
                  165,
                  BLUE_GLOW,
                  alpha=52,
