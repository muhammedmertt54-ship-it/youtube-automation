name: Process Psychology Shorts

on:
  push:
    paths:
      - "videos/manifest.json"
      - "renderer/**"
      - "main.py"
      - ".github/workflows/process-video.yml"
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Repository dosyalarını al
        uses: actions/checkout@v4

      - name: Gerekli araçları kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install pillow edge-tts

      - name: Manifest dosyasını doğrula
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          path = Path("videos/manifest.json")
          if not path.exists():
              raise RuntimeError("videos/manifest.json bulunamadı.")

          data = json.loads(path.read_text(encoding="utf-8"))
          scenes = data.get("scenes", [])

          if len(scenes) != 7:
              raise RuntimeError(
                  f"Tam olarak 7 sahne gerekli. Gelen: {len(scenes)}"
              )

          for index, scene in enumerate(scenes, start=1):
              for key in [
                  "text",
                  "highlight",
                  "visual_key",
                  "animation",
                  "duration",
              ]:
                  if key not in scene:
                      raise RuntimeError(
                          f"{index}. sahnede {key} alanı eksik."
                      )
          print("Manifest doğrulandı.")
          PY

      - name: Türkçe seslendirme oluştur
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          data = json.loads(
              Path("videos/manifest.json").read_text(encoding="utf-8")
          )
          script = str(data.get("script", "")).strip()
          if not script:
              raise RuntimeError("Seslendirme metni boş.")

          Path("videos/script.txt").write_text(
              script,
              encoding="utf-8"
          )
          PY

          edge-tts \
            --voice tr-TR-EmelNeural \
            --rate=+4% \
            --pitch=-2Hz \
            --file videos/script.txt \
            --write-media voice.mp3

      - name: Video görsellerini render et
        run: |
          python main.py \
            --manifest videos/manifest.json \
            --audio voice.mp3 \
            --output visuals_720x1280.mp4 \
            --brand MINDORA

      - name: Görüntüyü 1080x1920 yükselt
        run: |
          ffmpeg -y \
            -i visuals_720x1280.mp4 \
            -vf "scale=1080:1920:flags=lanczos" \
            -c:v libx264 \
            -preset fast \
            -crf 19 \
            -pix_fmt yuv420p \
            visuals.mp4

      - name: Hafif arka plan sesi üret
        run: |
          AUDIO_DURATION=$(ffprobe -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            voice.mp3)

          ffmpeg -y \
            -f lavfi -i "sine=frequency=196:sample_rate=44100:duration=${AUDIO_DURATION}" \
            -f lavfi -i "sine=frequency=247:sample_rate=44100:duration=${AUDIO_DURATION}" \
            -filter_complex "\
              [0:a]volume=0.015[a0];\
              [1:a]volume=0.010[a1];\
              [a0][a1]amix=inputs=2:normalize=0,\
              lowpass=f=1200,\
              highpass=f=90[music]" \
            -map "[music]" \
            -c:a aac \
            -b:a 128k \
            music.m4a

      - name: Ses ve görüntüyü birleştir
        run: |
          ffmpeg -y \
            -i visuals.mp4 \
            -i voice.mp3 \
            -i music.m4a \
            -filter_complex "\
              [1:a]volume=1.0[voice];\
              [2:a]volume=0.30[music];\
              [voice][music]amix=inputs=2:duration=first:dropout_transition=2[audio]" \
            -map 0:v:0 \
            -map "[audio]" \
            -c:v copy \
            -c:a aac \
            -b:a 192k \
            -shortest \
            final-video.mp4

      - name: Son videoyu kaydet
        uses: actions/upload-artifact@v4
        with:
          name: final-youtube-video
          path: final-video.mp4
          retention-days: 7
          if-no-files-found: error
