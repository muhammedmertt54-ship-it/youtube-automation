name: Process Psychology Shorts

on:
  push:
    paths:
      - "videos/manifest.json"
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Repository dosyalarını al
        uses: actions/checkout@v4

      - name: Gerekli araçları kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install pillow edge-tts

      - name: Manifest dosyasını doğrula
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          path = Path("videos/manifest.json")

          if not path.exists():
              raise RuntimeError("videos/manifest.json bulunamadı.")

          with path.open("r", encoding="utf-8") as file:
              data = json.load(file)

          required = ["title", "description", "script", "scenes"]

          for key in required:
              if key not in data:
                  raise RuntimeError(f"Manifest içinde {key} alanı eksik.")

          scenes = data.get("scenes", [])

          if not isinstance(scenes, list) or len(scenes) != 7:
              raise RuntimeError(
                  f"Tam olarak 7 sahne gerekli. Gelen sahne sayısı: {len(scenes)}"
              )

          allowed_visuals = {
              "mindy_thinking",
              "mindy_sad",
              "mindy_happy",
              "mindy_walking",
              "mindy_sitting",
              "mindy_confident",
              "mindy_listening",
              "mindy_talking",
              "mindy_looking_away",
              "two_people_close",
              "two_people_apart",
              "two_people_talking",
              "heart_broken",
              "heart_full",
              "brain_thinking",
              "eye_looking",
              "ear_listening",
              "phone",
              "message_bubble",
              "clock",
              "lock",
              "key",
              "warning",
              "question",
              "footsteps",
              "handshake",
          }

          allowed_animations = {
              "fade_in",
              "pop",
              "slide_left",
              "slide_right",
              "slow_zoom",
              "pulse",
              "shake",
              "float",
              "bounce",
          }

          for index, scene in enumerate(scenes, start=1):
              for key in [
                  "scene_number",
                  "text",
                  "highlight",
                  "visual_key",
                  "animation",
                  "duration",
              ]:
                  if key not in scene:
                      raise RuntimeError(
                          f"{index}. sahnede {key} alanı eksik."
                      )

              if scene["visual_key"] not in allowed_visuals:
                  raise RuntimeError(
                      f"{index}. sahnede desteklenmeyen visual_key: "
                      f"{scene['visual_key']}"
                  )

              if scene["animation"] not in allowed_animations:
                  raise RuntimeError(
                      f"{index}. sahnede desteklenmeyen animation: "
                      f"{scene['animation']}"
                  )

              duration = float(scene["duration"])

              if duration < 3 or duration > 10:
                  raise RuntimeError(
                      f"{index}. sahne süresi 3-10 saniye arasında olmalı."
                  )

          print("Manifest doğrulandı.")
          print("Başlık:", data["title"])
          print("Sahne sayısı:", len(scenes))
          PY

      - name: Türkçe seslendirme oluştur
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          with open("videos/manifest.json", "r", encoding="utf-8") as file:
              data = json.load(file)

          script = str(data.get("script", "")).strip()

          if not script:
              raise RuntimeError("Seslendirme metni boş.")

          Path("videos/script.txt").write_text(
              script,
              encoding="utf-8"
          )
          PY

          edge-tts \
            --voice tr-TR-EmelNeural \
            --rate=+4% \
            --pitch=-2Hz \
            --file videos/script.txt \
            --write-media voice.mp3

      - name: Orijinal arka plan müziği oluştur
        run: |
          AUDIO_DURATION=$(ffprobe -v error \
            -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 \
            voice.mp3)

          ffmpeg -y \
            -f lavfi -i "sine=frequency=196:sample_rate=44100:duration=${AUDIO_DURATION}" \
            -f lavfi -i "sine=frequency=247:sample_rate=44100:duration=${AUDIO_DURATION}" \
            -f lavfi -i "sine=frequency=294:sample_rate=44100:duration=${AUDIO_DURATION}" \
            -filter_complex "\
              [0:a]volume=0.018[a0];\
              [1:a]volume=0.012[a1];\
              [2:a]volume=0.008[a2];\
              [a0][a1][a2]amix=inputs=3:normalize=0,\
              lowpass=f=1200,\
              highpass=f=90,\
              afade=t=in:st=0:d=1.2,\
              afade=t=out:st=$(python - <<PY
          d=float('${AUDIO_DURATION}')
          print(max(0,d-1.5))
          PY
          ):d=1.5\
              [music]" \
            -map "[music]" \
            -c:a aac \
            -b:a 128k \
            music.m4a

      - name: Profesyonel sahne videosunu render et
        run: |
          python <<'PY'
          import json
          import math
          import random
          import subprocess
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont, ImageFilter

          MANIFEST_PATH = "videos/manifest.json"
          FPS = 30

          # Daha hızlı render için 720x1280 oluşturulur.
          # Son aşamada 1080x1920'ye yükseltilir.
          WIDTH = 720
          HEIGHT = 1280

          NAVY_TOP = (5, 18, 55)
          NAVY_BOTTOM = (13, 39, 96)
          WHITE = (248, 250, 255)
          SOFT_WHITE = (220, 230, 248)
          RED = (239, 56, 74)
          RED_DARK = (170, 24, 48)
          BLUE_GLOW = (55, 120, 255)
          SHADOW = (0, 0, 0, 95)

          FONT_BOLD = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          FONT_REGULAR = "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

          with open(MANIFEST_PATH, "r", encoding="utf-8") as file:
              manifest = json.load(file)

          scenes = manifest["scenes"]

          # Ses süresini al.
          probe = subprocess.run(
              [
                  "ffprobe",
                  "-v", "error",
                  "-show_entries", "format=duration",
                  "-of", "default=noprint_wrappers=1:nokey=1",
                  "voice.mp3",
              ],
              capture_output=True,
              text=True,
              check=True,
          )

          audio_duration = float(probe.stdout.strip())

          manifest_duration = sum(
              float(scene.get("duration", 5))
              for scene in scenes
          )

          if manifest_duration <= 0:
              manifest_duration = 35.0

          scale_factor = audio_duration / manifest_duration

          scene_durations = [
              max(2.8, float(scene.get("duration", 5)) * scale_factor)
              for scene in scenes
          ]

          # Son sahnenin süresini sesle tam eşleştir.
          difference = audio_duration - sum(scene_durations)
          scene_durations[-1] = max(
              2.8,
              scene_durations[-1] + difference
          )

          # Fontlar
          title_font = ImageFont.truetype(FONT_BOLD, 30)
          body_font = ImageFont.truetype(FONT_BOLD, 46)
          body_font_small = ImageFont.truetype(FONT_BOLD, 39)
          brand_font = ImageFont.truetype(FONT_BOLD, 25)
          tiny_font = ImageFont.truetype(FONT_REGULAR, 19)

          def clamp(value, low=0.0, high=1.0):
              return max(low, min(high, value))

          def ease_out_back(t):
              t = clamp(t)
              c1 = 1.70158
              c3 = c1 + 1
              return 1 + c3 * (t - 1) ** 3 + c1 * (t - 1) ** 2

          def ease_in_out(t):
              t = clamp(t)
              return 0.5 - 0.5 * math.cos(math.pi * t)

          def create_gradient():
              image = Image.new("RGB", (WIDTH, HEIGHT), NAVY_TOP)
              draw = ImageDraw.Draw(image)

              for y in range(HEIGHT):
                  ratio = y / max(1, HEIGHT - 1)
                  ratio = ratio ** 1.15

                  color = tuple(
                      int(
                          NAVY_TOP[channel] * (1 - ratio)
                          + NAVY_BOTTOM[channel] * ratio
                      )
                      for channel in range(3)
                  )

                  draw.line((0, y, WIDTH, y), fill=color)

              return image.convert("RGBA")

          def draw_vignette(image):
              overlay = Image.new("RGBA", image.size, (0, 0, 0, 0))
              pixels = overlay.load()

              center_x = WIDTH / 2
              center_y = HEIGHT / 2
              max_distance = math.sqrt(center_x ** 2 + center_y ** 2)

              for y in range(0, HEIGHT, 4):
                  for x in range(0, WIDTH, 4):
                      distance = math.sqrt(
                          (x - center_x) ** 2
                          + (y - center_y) ** 2
                      )

                      ratio = clamp(distance / max_distance)
                      alpha = int(max(0, (ratio - 0.45) * 150))

                      for yy in range(y, min(y + 4, HEIGHT)):
                          for xx in range(x, min(x + 4, WIDTH)):
                              pixels[xx, yy] = (0, 0, 0, alpha)

              image.alpha_composite(overlay)

          def draw_particles(draw, frame_number, scene_index):
              random.seed(scene_index * 1000)

              for particle_index in range(24):
                  base_x = random.randint(0, WIDTH)
                  base_y = random.randint(0, HEIGHT)
                  speed = random.uniform(0.15, 0.55)
                  radius = random.choice([1, 1, 2, 2, 3])

                  x = (
                      base_x
                      + math.sin(
                          frame_number * 0.015 * speed
                          + particle_index
                      ) * 18
                  ) % WIDTH

                  y = (
                      base_y
                      - frame_number * speed * 0.38
                  ) % HEIGHT

                  alpha = random.randint(18, 55)

                  draw.ellipse(
                      (
                          int(x - radius),
                          int(y - radius),
                          int(x + radius),
                          int(y + radius),
                      ),
                      fill=(180, 210, 255, alpha),
                  )

          def draw_wave_lines(draw, frame_number):
              phase = frame_number * 0.035

              configs = [
                  {
                      "base_y": 86,
                      "amplitude": 17,
                      "period": 118,
                      "color": (255, 255, 255, 205),
                      "width": 7,
                      "offset": 0.0,
                  },
                  {
                      "base_y": 116,
                      "amplitude": 22,
                      "period": 135,
                      "color": (239, 56, 74, 225),
                      "width": 10,
                      "offset": 1.3,
                  },
                  {
                      "base_y": HEIGHT - 112,
                      "amplitude": 22,
                      "period": 128,
                      "color": (239, 56, 74, 220),
                      "width": 10,
                      "offset": 0.7,
                  },
                  {
                      "base_y": HEIGHT - 80,
                      "amplitude": 15,
                      "period": 110,
                      "color": (255, 255, 255, 195),
                      "width": 7,
                      "offset": 2.1,
                  },
              ]

              for config in configs:
                  points = []

                  for x in range(-20, WIDTH + 21, 8):
                      y = (
                          config["base_y"]
                          + math.sin(
                              x / config["period"]
                              + phase
                              + config["offset"]
                          ) * config["amplitude"]
                      )

                      points.append((x, int(y)))

                  draw.line(
                      points,
                      fill=config["color"],
                      width=config["width"],
                      joint="curve",
                  )

          def draw_brand(draw, scene_number):
              brand = "MINDORA"

              brand_box = draw.textbbox(
                  (0, 0),
                  brand,
                  font=brand_font
              )

              brand_width = brand_box[2] - brand_box[0]

              x = WIDTH - brand_width - 34
              y = 31

              draw.rounded_rectangle(
                  (
                      x - 17,
                      y - 8,
                      x + brand_width + 17,
                      y + 37,
                  ),
                  radius=18,
                  fill=(255, 255, 255, 28),
                  outline=(255, 255, 255, 50),
                  width=1,
              )

              draw.text(
                  (x, y),
                  brand,
                  font=brand_font,
                  fill=WHITE,
              )

              draw.text(
                  (34, 35),
                  f"{scene_number}/7",
                  font=tiny_font,
                  fill=(210, 220, 245, 210),
              )

          def draw_progress(draw, progress):
              bar_x = 48
              bar_y = HEIGHT - 50
              bar_width = WIDTH - 96
              bar_height = 7

              draw.rounded_rectangle(
                  (
                      bar_x,
                      bar_y,
                      bar_x + bar_width,
                      bar_y + bar_height,
                  ),
                  radius=4,
                  fill=(255, 255, 255, 45),
              )

              filled = int(bar_width * clamp(progress))

              if filled > 0:
                  draw.rounded_rectangle(
                      (
                          bar_x,
                          bar_y,
                          bar_x + filled,
                          bar_y + bar_height,
                      ),
                      radius=4,
                      fill=RED,
                  )

          def draw_glow_circle(
              layer,
              center_x,
              center_y,
              radius,
              color,
              alpha=90,
          ):
              glow = Image.new("RGBA", layer.size, (0, 0, 0, 0))
              glow_draw = ImageDraw.Draw(glow)

              glow_draw.ellipse(
                  (
                      center_x - radius,
                      center_y - radius,
                      center_x + radius,
                      center_y + radius,
                  ),
                  fill=(*color, alpha),
              )

              glow = glow.filter(
                  ImageFilter.GaussianBlur(radius // 2)
              )

              layer.alpha_composite(glow)

          def draw_person_base(
              canvas,
              center_x,
              center_y,
              scale=1.0,
              pose="neutral",
              color=WHITE,
          ):
              draw = ImageDraw.Draw(canvas)

              stroke = max(10, int(18 * scale))
              head_radius = int(52 * scale)
              torso_length = int(170 * scale)
              limb_length = int(112 * scale)

              head_x = int(center_x)
              head_y = int(center_y - torso_length * 0.67)

              # Baş gölgesi
              draw.ellipse(
                  (
                      head_x - head_radius - 8,
                      head_y - head_radius + 11,
                      head_x + head_radius + 8,
                      head_y + head_radius + 27,
                  ),
                  fill=(0, 0, 0, 62),
              )

              draw.ellipse(
                  (
                      head_x - head_radius,
                      head_y - head_radius,
                      head_x + head_radius,
                      head_y + head_radius,
                  ),
                  fill=color,
              )

              shoulder_y = int(center_y - torso_length * 0.25)
              hip_y = int(center_y + torso_length * 0.55)

              # Gövde
              draw.line(
                  (
                      center_x,
                      shoulder_y,
                      center_x,
                      hip_y,
                  ),
                  fill=color,
                  width=stroke,
              )

              # Pozlara göre kol ve bacaklar
              if pose == "thinking":
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 70 * scale,
                          center_y + 20 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 48 * scale,
                          head_y + 24 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  # Düşünme eli
                  draw.ellipse(
                      (
                          center_x + 34 * scale,
                          head_y + 7 * scale,
                          center_x + 64 * scale,
                          head_y + 37 * scale,
                      ),
                      fill=color,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 62 * scale,
                          hip_y + limb_length * 0.72,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 46 * scale,
                          hip_y + limb_length * 0.75,
                      ),
                      fill=color,
                      width=stroke,
                  )

              elif pose == "happy":
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - limb_length * 0.72,
                          shoulder_y - limb_length * 0.55,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + limb_length * 0.72,
                          shoulder_y - limb_length * 0.55,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 68 * scale,
                          hip_y + 95 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 68 * scale,
                          hip_y + 95 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

              elif pose == "sad":
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 65 * scale,
                          center_y + 80 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 65 * scale,
                          center_y + 80 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 44 * scale,
                          hip_y + 95 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 44 * scale,
                          hip_y + 95 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

              elif pose == "walking":
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 58 * scale,
                          center_y + 28 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 62 * scale,
                          center_y - 16 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 70 * scale,
                          hip_y + 82 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 90 * scale,
                          hip_y + 42 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

              elif pose == "confident":
                  # Eller belde
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 78 * scale,
                          center_y + 22 * scale,
                          center_x - 44 * scale,
                          hip_y - 10 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 78 * scale,
                          center_y + 22 * scale,
                          center_x + 44 * scale,
                          hip_y - 10 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 62 * scale,
                          hip_y + 100 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 62 * scale,
                          hip_y + 100 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

              elif pose == "listening":
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 70 * scale,
                          center_y + 35 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 54 * scale,
                          head_y + 8 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 55 * scale,
                          hip_y + 95 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 55 * scale,
                          hip_y + 95 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

              elif pose == "talking":
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 75 * scale,
                          center_y + 20 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 92 * scale,
                          shoulder_y - 16 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 58 * scale,
                          hip_y + 96 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 58 * scale,
                          hip_y + 96 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  # Konuşma çizgileri
                  for line_index in range(3):
                      y = int(
                          head_y - 30 * scale
                          + line_index * 23 * scale
                      )

                      draw.line(
                          (
                              head_x + 75 * scale,
                              y,
                              head_x + (118 + line_index * 8) * scale,
                              y - 8 * scale,
                          ),
                          fill=RED,
                          width=max(5, int(7 * scale)),
                      )

              elif pose == "looking_away":
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 62 * scale,
                          center_y + 50 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 62 * scale,
                          center_y + 50 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 60 * scale,
                          hip_y + 95 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 60 * scale,
                          hip_y + 95 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  # Baş yönü
                  draw.ellipse(
                      (
                          head_x + 12 * scale,
                          head_y - 8 * scale,
                          head_x + 26 * scale,
                          head_y + 6 * scale,
                      ),
                      fill=NAVY_TOP,
                  )

              elif pose == "sitting":
                  seat_y = hip_y + 45 * scale

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 60 * scale,
                          center_y + 40 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 60 * scale,
                          center_y + 40 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 85 * scale,
                          seat_y,
                          center_x - 95 * scale,
                          seat_y + 82 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 85 * scale,
                          seat_y,
                          center_x + 95 * scale,
                          seat_y + 82 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

              else:
                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x - 72 * scale,
                          center_y + 40 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          shoulder_y,
                          center_x + 72 * scale,
                          center_y + 40 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x - 58 * scale,
                          hip_y + 100 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

                  draw.line(
                      (
                          center_x,
                          hip_y,
                          center_x + 58 * scale,
                          hip_y + 100 * scale,
                      ),
                      fill=color,
                      width=stroke,
                  )

              # Basit yüz
              eye_y = int(head_y - 10 * scale)

              draw.ellipse(
                  (
                      head_x - 26 * scale,
                      eye_y - 8 * scale,
                      head_x - 12 * scale,
                      eye_y + 6 * scale,
                  ),
                  fill=NAVY_TOP,
              )

              draw.ellipse(
                  (
                      head_x + 12 * scale,
                      eye_y - 8 * scale,
                      head_x + 26 * scale,
                      eye_y + 6 * scale,
                  ),
                  fill=NAVY_TOP,
              )

              return {
                  "head_x": head_x,
                  "head_y": head_y,
                  "head_radius": head_radius,
                  "hip_y": hip_y,
              }

          def draw_heart(
              draw,
              center_x,
              center_y,
              size,
              broken=False,
              color=RED,
          ):
              left = center_x - size // 2
              top = center_y - size // 2

              points = []

              for step in range(0, 361, 4):
                  angle = math.radians(step)
                  x = (
                      16 * math.sin(angle) ** 3
                  )

                  y = (
                      13 * math.cos(angle)
                      - 5 * math.cos(2 * angle)
                      - 2 * math.cos(3 * angle)
                      - math.cos(4 * angle)
                  )

                  points.append(
                      (
                          int(center_x + x * size / 34),
                          int(center_y - y * size / 34),
                      )
                  )

              draw.polygon(points, fill=color)

              if broken:
                  crack = [
                      (center_x - 6, top + size * 0.16),
                      (center_x + 18, top + size * 0.34),
                      (center_x - 13, top + size * 0.52),
                      (center_x + 11, top + size * 0.70),
                      (center_x - 7, top + size * 0.88),
                  ]

                  draw.line(
                      crack,
                      fill=NAVY_BOTTOM,
                      width=max(8, size // 24),
                  )

