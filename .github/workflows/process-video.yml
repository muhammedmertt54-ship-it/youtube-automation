                  (2, -1),
                  (-2, 0),
                  (-1, 0),
                  (0, 0),
                  (1, 0),
                  (2, 0),
                  (-2, 1),
                  (-1, 2),
                  (0, 2),
                  (1, 2),
                  (2, 1),
              ]

              for ox, oy in offsets:
                  x = center_x + ox * radius * 0.72
                  y = center_y + oy * radius * 0.61

                  draw.ellipse(
                      (
                          x - radius,
                          y - radius,
                          x + radius,
