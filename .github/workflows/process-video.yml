name: Process YouTube Video

on:
  push:
    paths:
      - "videos/manifest.json"
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest

    steps:
      - name: Dosyaları al
        uses: actions/checkout@v4

      - name: Gerekli araçları kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install pillow edge-tts

      - name: Manifest kontrolü
        run: |
          test -f videos/manifest.json || {
            echo "videos/manifest.json bulunamadı"
            exit 1
          }

      - name: Türkçe ses oluştur
        run: |
          python <<'PY'
          import json

          with open("videos/manifest.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          script = data.get("script", "").strip()

          if not script:
              raise RuntimeError("Seslendirme metni bulunamadı.")

          with open("videos/script.txt", "w", encoding="utf-8") as f:
              f.write(script)
          PY

          edge-tts \
            --voice tr-TR-EmelNeural \
            --rate=+0% \
            --file videos/script.txt \
            --write-media voice.mp3

      - name: Çocuk animasyonu sahnelerini hazırla
        run: |
          python <<'PY'
          import json
          import math
          import subprocess
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont

          with open("videos/manifest.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          scenes = data.get("scenes", [])
          video_format = data.get("format", "short")

          if not scenes:
              raise RuntimeError("Sahne bulunamadı.")

          if video_format == "short":
              width, height = 1080, 1920
          else:
              width, height = 1920, 1080

          font_path = "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
          normal_font_path = "/usr/share/fonts/truetype/dejavu/DejaVuSans.ttf"

          title_font = ImageFont.truetype(font_path, max(42, width // 24))
          text_font = ImageFont.truetype(normal_font_path, max(32, width // 34))

          def wrap_text(draw, text, font, max_width):
              words = text.split()
              lines = []
              current = ""

              for word in words:
                  test = f"{current} {word}".strip()
                  box = draw.textbbox((0, 0), test, font=font)

                  if box[2] - box[0] <= max_width:
                      current = test
                  else:
                      if current:
                          lines.append(current)
                      current = word

              if current:
                  lines.append(current)

              return lines

          def draw_cloud(draw, x, y, scale=1):
              white = (255, 255, 255)
              draw.ellipse((x, y, x + 180*scale, y + 120*scale), fill=white)
              draw.ellipse((x + 90*scale, y - 55*scale, x + 280*scale, y + 120*scale), fill=white)
              draw.ellipse((x + 210*scale, y, x + 390*scale, y + 120*scale), fill=white)
              draw.rounded_rectangle(
                  (x + 45*scale, y + 55*scale, x + 350*scale, y + 145*scale),
                  radius=int(40*scale),
                  fill=white
              )

          def draw_sun(draw, x, y, radius):
              for angle in range(0, 360, 30):
                  a = math.radians(angle)
                  x1 = x + math.cos(a) * (radius + 20)
                  y1 = y + math.sin(a) * (radius + 20)
                  x2 = x + math.cos(a) * (radius + 70)
                  y2 = y + math.sin(a) * (radius + 70)
                  draw.line((x1, y1, x2, y2), fill=(255, 205, 45), width=18)

              draw.ellipse(
                  (x-radius, y-radius, x+radius, y+radius),
                  fill=(255, 220, 55)
              )

              draw.ellipse((x-35, y-20, x-15, y), fill=(70, 70, 70))
              draw.ellipse((x+15, y-20, x+35, y), fill=(70, 70, 70))
              draw.arc(
                  (x-40, y-5, x+40, y+50),
                  start=10,
                  end=170,
                  fill=(70, 70, 70),
                  width=7
              )

          def draw_rain(draw, width, height):
              for i in range(12):
                  x = int(width * (0.08 + i * 0.075))
                  y = int(height * (0.40 + (i % 3) * 0.06))
                  draw.line(
                      (x, y, x - 20, y + 70),
                      fill=(80, 165, 255),
                      width=max(8, width // 120)
                  )

          def draw_flowers(draw, width, height):
              ground_y = int(height * 0.78)

              draw.rectangle(
                  (0, ground_y, width, height),
                  fill=(100, 205, 105)
              )

              for i in range(8):
                  x = int(width * (0.08 + i * 0.12))
                  stem_top = ground_y - 130 - (i % 2) * 50

                  draw.line(
                      (x, ground_y, x, stem_top),
                      fill=(40, 145, 65),
                      width=max(8, width // 120)
                  )

                  color = [
                      (255, 100, 120),
                      (255, 210, 60),
                      (160, 100, 255),
                      (255, 145, 60)
                  ][i % 4]

                  for angle in range(0, 360, 72):
                      a = math.radians(angle)
                      px = x + math.cos(a) * 35
                      py = stem_top + math.sin(a) * 35
                      draw.ellipse(
                          (px-25, py-25, px+25, py+25),
                          fill=color
                      )

                  draw.ellipse(
                      (x-22, stem_top-22, x+22, stem_top+22),
                      fill=(255, 220, 60)
                  )

          Path("scenes").mkdir(exist_ok=True)

          for index, scene in enumerate(scenes, start=1):
              narration = str(scene.get("narration", ""))
              prompt = str(scene.get("image_prompt", ""))
              combined = f"{narration} {prompt}".lower()

              image = Image.new("RGB", (width, height), (105, 190, 255))
              draw = ImageDraw.Draw(image)

              for y in range(height):
                  ratio = y / height
                  color = (
                      int(85 + 90 * ratio),
                      int(175 + 55 * ratio),
                      int(250 - 20 * ratio)
                  )
                  draw.line((0, y, width, y), fill=color)

              draw_sun(
                  draw,
                  int(width * 0.82),
                  int(height * 0.15),
                  int(width * 0.075)
              )

              draw_cloud(
                  draw,
                  int(width * 0.08),
                  int(height * 0.20),
                  max(0.8, width / 1900)
              )

              draw_cloud(
                  draw,
                  int(width * 0.50),
                  int(height * 0.30),
                  max(0.65, width / 2300)
              )

              if "yağmur" in combined or "rain" in combined:
                  draw_rain(draw, width, height)

              if (
                  "çiçek" in combined or
                  "bitki" in combined or
                  "flower" in combined or
                  "plant" in combined
              ):
                  draw_flowers(draw, width, height)

              panel_margin = int(width * 0.06)
              panel_top = int(height * 0.60)
              panel_bottom = int(height * 0.91)

              draw.rounded_rectangle(
                  (
                      panel_margin,
                      panel_top,
                      width - panel_margin,
                      panel_bottom
                  ),
                  radius=max(35, width // 28),
                  fill=(255, 255, 255, 235),
                  outline=(255, 220, 80),
                  width=max(8, width // 120)
              )

              scene_title = f"Sahne {index}"
              draw.text(
                  (panel_margin + 45, panel_top + 35),
                  scene_title,
                  font=title_font,
                  fill=(55, 80, 160)
              )

              lines = wrap_text(
                  draw,
                  narration,
                  text_font,
                  width - panel_margin * 2 - 90
              )

              text_y = panel_top + 125

              for line in lines[:7]:
                  draw.text(
                      (panel_margin + 45, text_y),
                      line,
                      font=text_font,
                      fill=(45, 45, 70)
                  )
                  text_y += text_font.size + 15

              output = f"scenes/scene_{index:03d}.png"
              image.save(output, quality=95)

          with open("scene_data.json", "w", encoding="utf-8") as f:
              json.dump(
                  {
                      "format": video_format,
                      "width": width,
                      "height": height,
                      "scenes": scenes
                  },
                  f,
                  ensure_ascii=False,
                  indent=2
              )
          PY

      - name: Sahne videolarını oluştur
        run: |
          python <<'PY'
          import json
          import subprocess

          with open("scene_data.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          width = data["width"]
          height = data["height"]
          scenes = data["scenes"]

          probe = subprocess.run(
              [
                  "ffprobe",
                  "-v", "error",
                  "-show_entries", "format=duration",
                  "-of", "default=noprint_wrappers=1:nokey=1",
                  "voice.mp3"
              ],
              capture_output=True,
              text=True,
              check=True
          )

          audio_duration = float(probe.stdout.strip())
          original_total = sum(
              float(scene.get("duration", 8))
              for scene in scenes
          )

          if original_total <= 0:
              original_total = len(scenes) * 8

          scale_factor = audio_duration / original_total
          output_files = []

          for index, scene in enumerate(scenes, start=1):
              original_duration = float(scene.get("duration", 8))
              duration = max(1.0, original_duration * scale_factor)

              image_path = f"scenes/scene_{index:03d}.png"
              output_path = f"scene_{index:03d}.mp4"

              frames = max(1, round(duration * 30))

              video_filter = (
                  f"scale={width}:{height},"
                  f"zoompan="
                  f"z='min(zoom+0.0008,1.08)':"
                  f"x='iw/2-(iw/zoom/2)':"
                  f"y='ih/2-(ih/zoom/2)':"
                  f"d={frames}:"
                  f"s={width}x{height}:"
                  f"fps=30,"
                  f"format=yuv420p"
              )

              subprocess.run(
                  [
                      "ffmpeg",
                      "-y",
                      "-loop", "1",
                      "-i", image_path,
                      "-vf", video_filter,
                      "-t", str(duration),
                      "-an",
                      "-c:v", "libx264",
                      "-preset", "fast",
                      "-crf", "23",
                      "-pix_fmt", "yuv420p",
                      output_path
                  ],
                  check=True
              )

              output_files.append(output_path)

          with open("concat.txt", "w", encoding="utf-8") as f:
              for path in output_files:
                  f.write(f"file '{path}'\n")

          subprocess.run(
              [
                  "ffmpeg",
                  "-y",
                  "-f", "concat",
                  "-safe", "0",
                  "-i", "concat.txt",
                  "-c", "copy",
                  "visuals.mp4"
              ],
              check=True
          )
          PY

      - name: Görüntü ve sesi birleştir
        run: |
          ffmpeg -y \
            -i visuals.mp4 \
            -i voice.mp3 \
            -map 0:v:0 \
            -map 1:a:0 \
            -c:v copy \
            -c:a aac \
            -b:a 192k \
            -shortest \
            final-video.mp4

      - name: Son videoyu kaydet
        uses: actions/upload-artifact@v4
        with:
          name: final-youtube-video
          path: final-video.mp4
          retention-days: 7
