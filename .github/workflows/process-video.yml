name: Process Deep Worlds Video

on:
  push:
    paths:
      - "videos/manifest.json"
      - "main.py"
      - ".github/workflows/process-video.yml"
      - "assets/**"
  workflow_dispatch:

jobs:
  create-video:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repository dosyalarını al
        uses: actions/checkout@v4

      - name: Gerekli araçları kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          python -m pip install --upgrade pip
          pip install pillow

      - name: Manifest dosyasını doğrula
        run: |
          python <<'PY'
          import json
          from pathlib import Path

          path = Path("videos/manifest.json")

          if not path.exists():
              raise RuntimeError("videos/manifest.json bulunamadı.")

          data = json.loads(path.read_text(encoding="utf-8"))

          required = [
              "brand",
              "sequence",
              "category",
              "quote",
              "music_key",
              "duration",
              "image_path",
          ]

          for field in required:
              if field not in data or data[field] in (None, ""):
                  raise RuntimeError(f"{field} alanı eksik.")

          duration = float(data["duration"])

          if duration < 7 or duration > 12:
              raise RuntimeError("duration 7-12 saniye arasında olmalı.")

          image_path = Path(data["image_path"])

          if not image_path.exists():
              raise RuntimeError(f"Fotoğraf bulunamadı: {image_path}")

          print("Manifest doğrulandı.")
          print("Görsel:", image_path)
          print("Söz:", data["quote"])
          PY

      - name: Deep Worlds videosunu oluştur
        run: |
          python main.py \
            --manifest videos/manifest.json \
            --output final-video.mp4

      - name: Video bilgilerini göster
        run: |
          ffprobe -v error \
            -show_entries format=duration,size \
            -show_entries stream=codec_name,width,height,r_frame_rate \
            -of default=noprint_wrappers=1 \
            final-video.mp4

      - name: Son videoyu kaydet
        uses: actions/upload-artifact@v4
        with:
          name: final-deep-worlds-video
          path: final-video.mp4
          retention-days: 7
          if-no-files-found: error
