name: Process YouTube Video

on:
  workflow_dispatch:
  push:
    paths:
      - "videos/manifest.json"

jobs:
  process-video:
    runs-on: ubuntu-latest

    steps:
      - name: Dosyaları al
        uses: actions/checkout@v4

      - name: FFmpeg ve Edge TTS kur
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install edge-tts

      - name: Manifest dosyasını kontrol et
        run: |
          test -f videos/manifest.json || {
            echo "videos/manifest.json bulunamadı"
            exit 1
          }

      - name: Sahne videolarını indir ve hazırla
        run: |
          python <<'PY'
          import json
          import os
          import subprocess
          import urllib.request

          manifest_path = "videos/manifest.json"

          with open(manifest_path, "r", encoding="utf-8") as file:
              data = json.load(file)

          video_format = data.get("format", "short")
          script = data.get("script", "").strip()
          scenes = data.get("scenes", [])

          if not script:
              raise RuntimeError("Seslendirme metni bulunamadı.")

          if not scenes:
              raise RuntimeError("Sahne listesi bulunamadı.")

          with open("videos/script.txt", "w", encoding="utf-8") as file:
              file.write(script)

          if video_format == "short":
              width = 1080
              height = 1920
          else:
              width = 1920
              height = 1080

          output_files = []

          for index, scene in enumerate(scenes, start=1):
              video_url = scene.get("video_url")
              duration = float(scene.get("duration", 8))

              if not video_url:
                  raise RuntimeError(
                      f"{index}. sahnede video_url bulunamadı."
                  )

              source_path = f"scene_source_{index:03d}.mp4"
              output_path = f"scene_{index:03d}.mp4"

              request = urllib.request.Request(
                  video_url,
                  headers={"User-Agent": "Mozilla/5.0"}
              )

              with urllib.request.urlopen(request, timeout=120) as response:
                  with open(source_path, "wb") as output:
                      output.write(response.read())

              video_filter = (
                  f"scale={width}:{height}:"
                  "force_original_aspect_ratio=increase,"
                  f"crop={width}:{height},"
                  "fps=30,"
                  "format=yuv420p"
              )

              command = [
                  "ffmpeg",
                  "-y",
                  "-stream_loop", "-1",
                  "-i", source_path,
                  "-t", str(duration),
                  "-an",
                  "-vf", video_filter,
                  "-c:v", "libx264",
                  "-preset", "fast",
                  "-crf", "23",
                  "-pix_fmt", "yuv420p",
                  output_path,
              ]

              subprocess.run(command, check=True)
              output_files.append(output_path)

          with open("concat.txt", "w", encoding="utf-8") as file:
              for path in output_files:
                  file.write(f"file '{path}'\n")

          subprocess.run(
              [
                  "ffmpeg",
                  "-y",
                  "-f", "concat",
                  "-safe", "0",
                  "-i", "concat.txt",
                  "-c", "copy",
                  "visuals.mp4",
              ],
              check=True,
          )
          PY

      - name: Türkçe seslendirme oluştur
        run: |
          edge-tts \
            --voice tr-TR-EmelNeural \
            --rate=+0% \
            --file videos/script.txt \
            --write-media voice.mp3

      - name: Görüntü ile Türkçe sesi birleştir
        run: |
          ffmpeg -y \
            -i visuals.mp4 \
            -i voice.mp3 \
            -map 0:v:0 \
            -map 1:a:0 \
            -c:v copy \
            -c:a aac \
            -b:a 192k \
            -shortest \
            final-video.mp4

      - name: Son videoyu kaydet
        uses: actions/upload-artifact@v4
        with:
          name: final-youtube-video
          path: final-video.mp4
          retention-days: 7
